name: preflight (typecheck · test · build · DB gate)

# main 보호 게이트. branch protection 에서 이 워크플로를 "required check" 로 지정해 강제한다.
#   순서: npm ci --ignore-scripts → typecheck → unit test → production build
#         → migration check → RLS smoke → DB guard smoke.
#   SUPABASE_ACCESS_TOKEN 시크릿이 없으면 skip 이 아니라 FAIL (게이트 무력화 방지, 2026-07-22 P0).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Require SUPABASE_ACCESS_TOKEN (fail if missing)
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — DB gates cannot run. Add it in repo Settings > Secrets to unblock preflight."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      # --ignore-scripts: puppeteer/playwright 브라우저 다운로드 등 postinstall 생략 (게이트에 불필요, 공급망 표면 축소)
      - name: install
        run: npm ci --ignore-scripts

      - name: typecheck
        run: npx tsc --noEmit

      - name: unit tests
        run: npx vitest run

      - name: production build
        run: npm run build

      - name: check migrations applied
        run: node scripts/check-migrations.mjs

      - name: RLS regression smoke
        run: node scripts/rls-smoke.mjs

      - name: DB guards smoke
        run: node scripts/db-guards-smoke.mjs
